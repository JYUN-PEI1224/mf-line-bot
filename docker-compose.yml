version: "3.8"

services:
  mf-line-bot:
    build: .
    container_name: mf-line-bot
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - MF_OFFICE_ACCOUNT_NAME=${MF_OFFICE_ACCOUNT_NAME:-}
      - USER_STORE_FILE=/data/user_store.json
    volumes:
      # 認証情報の永続化
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
